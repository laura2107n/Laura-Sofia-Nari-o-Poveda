<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alison - Cocina 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>


    <div class="panel">
        <h2>Cocina de Restaurante 3D</h2>
        <p>
            Usa el mouse para girar la cámara y WASD o las flechas para moverte por la cocina.
        </p>
        <p>
            Apunta con el círculo del centro a los platillos para prepararlos.
        </p>
        <p>
            Pedidos completados: <span id="contador">0</span>
        </p>
    </div>


    <a-scene>


        <a-assets>
            <img id="Suelo" src="img/suelo c.jpg">
            <img id="Fondo" src="img/fondo c.jpg">
            <audio id="sonido" src="sound/sonido.mp3"></audio>
        </a-assets>


        <a-entity position="0 1.6 5">
            <a-camera>
                <a-cursor
                    color="black"
                    fuse="true"
                    fuse-timeout="700">
                </a-cursor>
            </a-camera>
        </a-entity>


        <a-sky src="#Fondo"></a-sky>
        <a-entity sound="src: #sonido; autoplay: true; loop: true; volume: 0.3"></a-entity>


        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="point" intensity="1.2" position="0 6 0"></a-light>


        <a-box position="0 4 -10" width="25" height="8" depth="0.5" color="#f5f5f5"></a-box>
        <a-text
            value="LA COCINA DE ALISON"
            position="-4 5 -9.5"
            scale="2.5 2.5 2.5"
            color="#333333">
        </a-text>


        <a-box position="0 1 -2.5" width="5" height="1.2" depth="1.8" color="#7f8c8d">
           
            <a-cone class="producto" position="-1.5 0.7 0" radius-bottom="0.3" radius-top="0" height="0.3" color="#27ae60"></a-cone>
           
            <a-cylinder class="producto" position="0 0.75 0" radius="0.35" height="0.3" color="#d35400"></a-cylinder>
            <a-sphere position="0 0.9 0" radius="0.06" color="#111111"></a-sphere>


            <a-cylinder class="producto" position="1.5 0.7 0" radius="0.3" height="0.2" color="#e74c3c"></a-cylinder>


        </a-box>


        <a-box position="-4 1 -6" width="2" height="1.4" depth="2" color="#34495e">
            <a-cylinder position="-0.4 0.71 -0.4" radius="0.18" height="0.02" color="#111111"></a-cylinder>
            <a-cylinder position="0.4 0.71 -0.4" radius="0.18" height="0.02" color="#111111"></a-cylinder>
            <a-cylinder position="-0.4 0.71 0.4" radius="0.18" height="0.02" color="#111111"></a-cylinder>
            <a-cylinder position="0.4 0.71 0.4" radius="0.18" height="0.02" color="#111111"></a-cylinder>
            <a-box position="0 0 1.01" width="1.6" height="0.8" depth="0.02" color="#2c3e50"></a-box>
            <a-box position="0 0.3 1.05" width="0.8" height="0.05" depth="0.05" color="#bdc3c7"></a-box>
        </a-box>


        <a-box position="4 2.1 -6" width="1.6" height="4.2" depth="1.6" color="#bdc3c7">
            <a-box position="0 0 0.81" width="0.02" height="4.2" depth="0.01" color="#95a5a6"></a-box>
            <a-box position="-0.1 2.2 0.85" width="0.04" height="0.6" depth="0.04" color="#7f8c8d"></a-box>
            <a-box position="-0.1 1.2 0.85" width="0.04" height="0.6" depth="0.04" color="#7f8c8d"></a-box>
        </a-box>


        <a-torus
            position="0 4.5 -2.5"
            radius="0.6"
            radius-tubular="0.05"
            color="#f1c40f"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-torus>
       
        <a-plane
         rotation="-90 0 0"
         width="40"
         height="40"
         src="#Suelo"
         color="#7f8c8d"
         repeat="20 20"
         shadow="receive: true">
        </a-plane>
    </a-scene>


    <script src="app.js"></script>
</body>
</html>
