<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
    <div class="panel">
        <h2>Tienda Virtual 3D</h2>
        <p>Con el mouse puedes girar la cámara y con WASD o las flechas puedes moverte.</p>
        <p>Mira el círculo del centro de la pantalla y apunta a los productos.</p>
        <p>Productos seleccionados: <span id="contador">0</span></p>
    </div>


    <a-scene>
        <a-assets>
            <img id="piso" src="img/piso e.jpg">
            <img id="cielo" src="img/fondo e.jpg">
            <audio id="musica" src="sound/crab_audio-a-real-groove-322193.mp3"></audio>
        </a-assets>


        <a-entity position="0 1.6 10">
            <a-camera>
                <a-cursor
                    color="black"
                    fuse="true"
                    fuse-timeout="700">
                </a-cursor>
            </a-camera>
        </a-entity>


        <a-plane
            rotation="-90 0 0"
            width="40"
            height="40"
            src="#piso"
            repeat="20 20"
            shadow="receive: true">
        </a-plane>


        <a-sky src="#cielo"></a-sky>  


        <a-entity sound="src: #musica; autoplay: true; volume: 0.5"></a-entity>


        <a-box position="0 4 -15" width="30" height="8" depth="0.5" color="#ffffff"></a-box>


        <a-box position="0 1 -2" width="6" height="2" depth="2" color="#6d4c41"></a-box>


        <a-box position="-8 2 -8" width="6" height="4" depth="1" color="#8B4513"></a-box>
        <a-box position="8 2 -8" width="6" height="4" depth="1" color="#8B4513"></a-box>


        <a-box class="producto" position="-10 4 -8" color="red"></a-box>
        <a-box class="producto" position="-8 4 -8" color="blue"></a-box>
        <a-box class="producto" position="-6 4 -8" color="green"></a-box>


        <a-box class="producto" position="10 4 -8" color="purple"></a-box>
        <a-box class="producto" position="8 4 -8" color="blue"></a-box>
        <a-box class="producto" position="6 4 -8" color="black"></a-box>


        <a-sphere class="producto" position="10 2 8" radius="0.5" color="blue"></a-sphere>
        <a-sphere class="producto" position="8 2 8" radius="0.5" color="black"></a-sphere>


        <a-cylinder class="producto" position="8 2 8" radius="0.5" height="1" color="purple"></a-cylinder>
        <a-cylinder class="producto" position="10 2 8" radius="0.5" height="1" color="#009688"></a-cylinder>


        <a-text
            value=" Bienvenidos "
            position="-5 6 -10"
            scale="3 3 3"
            color="black">
        </a-text>


        <a-light type="ambient" intensity="1"></a-light>
        <a-light type="point" intensity="1.5" position="0 8 0"></a-light>


        <a-torus
            position="0 5 -6"
            radius="1"
            radius-tubular="0.1"
            color="#2196F3"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-torus>


    </a-scene>


    <script src="app.js"></script>
</body>
</html>
